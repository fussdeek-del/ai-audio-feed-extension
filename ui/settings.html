<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Audio Feed – Settings</title>
  <style>
    /* -----------------------------------------------------------------------
       Reset & base
    ----------------------------------------------------------------------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f1117;
      --surface:      #1a1d27;
      --border:       #2a2d3a;
      --accent:       #1d9bf0;
      --accent-hover: #1a8cd8;
      --text:         #e7e9ea;
      --muted:        #71767b;
      --success:      #00ba7c;
      --error:        #f4212e;
      --radius:       8px;
      --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      width: 340px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 16px;
    }

    /* -----------------------------------------------------------------------
       Header
    ----------------------------------------------------------------------- */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .header-icon { font-size: 22px; }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* -----------------------------------------------------------------------
       Engine badge
    ----------------------------------------------------------------------- */
    .engine-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .engine-badge.native {
      background: rgba(113,118,123,0.2);
      color: var(--muted);
    }

    .engine-badge.elevenlabs {
      background: rgba(29,155,240,0.15);
      color: var(--accent);
    }

    /* -----------------------------------------------------------------------
       Form elements
    ----------------------------------------------------------------------- */
    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    /* -----------------------------------------------------------------------
       Slider row
    ----------------------------------------------------------------------- */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }

    .slider-value {
      font-size: 12px;
      color: var(--muted);
      min-width: 28px;
      text-align: right;
    }

    /* -----------------------------------------------------------------------
       Buttons
    ----------------------------------------------------------------------- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: var(--font);
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 12px;
      padding: 5px 10px;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    /* -----------------------------------------------------------------------
       Status bar
    ----------------------------------------------------------------------- */
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      border-radius: 4px;
      padding: 3px 0;
    }

    #status.success { color: var(--success); }
    #status.error   { color: var(--error); }

    /* -----------------------------------------------------------------------
       Divider
    ----------------------------------------------------------------------- */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }

    /* -----------------------------------------------------------------------
       Section header
    ----------------------------------------------------------------------- */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    /* -----------------------------------------------------------------------
       Row helpers
    ----------------------------------------------------------------------- */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    /* -----------------------------------------------------------------------
       Voice list loading state
    ----------------------------------------------------------------------- */
    #voiceStatus {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-icon">🔊</span>
    <div>
      <div class="header-title">AI Audio Feed</div>
      <div class="header-sub">Text-to-speech for social feeds</div>
    </div>
  </div>

  <!-- Active engine badge -->
  <div id="engineBadge" class="engine-badge native">
    <span id="engineDot">●</span>
    <span id="engineLabel">Browser TTS (default)</span>
  </div>

  <!-- ─── ElevenLabs Section ─────────────────────────────────────────── -->
  <div class="section-title">ElevenLabs (optional)</div>

  <div class="field">
    <label for="apiKeyInput">API Key</label>
    <div class="row">
      <input
        type="password"
        id="apiKeyInput"
        placeholder="Paste your ElevenLabs API key…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn btn-ghost" id="toggleVisibility" title="Show/hide key">👁</button>
    </div>
  </div>

  <div class="field">
    <label for="voiceSelect">Voice</label>
    <select id="voiceSelect">
      <option value="21m00Tcm4TlvDq8ikWAM">Rachel (default)</option>
    </select>
    <div id="voiceStatus"></div>
  </div>

  <button class="btn btn-ghost" id="fetchVoicesBtn" style="width:100%;margin-bottom:10px;">
    ↻ Load voices from ElevenLabs
  </button>

  <hr class="divider" />

  <!-- ─── Browser TTS Controls ──────────────────────────────────────── -->
  <div class="section-title">Browser TTS settings</div>

  <div class="field">
    <label>Speed</label>
    <div class="slider-row">
      <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1.0" />
      <span class="slider-value" id="rateVal">1.0×</span>
    </div>
  </div>

  <div class="field">
    <label>Pitch</label>
    <div class="slider-row">
      <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1.0" />
      <span class="slider-value" id="pitchVal">1.0</span>
    </div>
  </div>

  <div class="field">
    <label>Volume</label>
    <div class="slider-row">
      <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1.0" />
      <span class="slider-value" id="volumeVal">100%</span>
    </div>
  </div>

  <hr class="divider" />

  <!-- Save button -->
  <button class="btn btn-primary" id="saveBtn">Save Settings</button>

  <!-- Status feedback -->
  <div id="status"></div>

  <script src="settings.js"></script>
</body>
</html>
